{% extends 'rh/base_rh.html' %}
{% block conteudo %}

<div class="flex items-center gap-2 text-sm text-gray-500 mb-5">
  <a href="{% url 'rh_inst_candidatura_detalhe' cand.pk %}" class="hover:text-primary">{{ cand.nome }}</a>
  <i class="fas fa-chevron-right text-xs"></i>
  <span class="text-gray-700 dark:text-gray-300">Agendar Entrevista</span>
</div>

<div class="max-w-xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white">Agendar Entrevista</h1>
      <p class="text-gray-500 mt-1 text-sm">{{ cand.nome }} · {{ cand.vaga.titulo }}</p>
    </div>
    <a href="{% url 'rh_inst_candidatura_detalhe' cand.pk %}"
       class="inline-flex items-center gap-2 px-4 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-all text-sm">
      <i class="fas fa-arrow-left text-base"></i>Voltar
    </a>
  </div>

  <form method="POST" class="space-y-5">
    {% csrf_token %}

    <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
      <div class="flex items-center gap-3 px-6 py-4 bg-gray-50 dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <i class="fas fa-calendar-alt text-primary"></i>
        <h2 class="font-semibold text-gray-900 dark:text-white">Detalhes da Entrevista</h2>
      </div>
      <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Data e Hora <span class="text-red-500">*</span></label>
          <input type="datetime-local" name="data_hora" required
                 class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Tipo</label>
          <select name="tipo" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all">
            <option value="Presencial">Presencial</option>
            <option value="Online">Online / Videochamada</option>
            <option value="Telefónica">Telefónica</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Local / Link</label>
          <input type="text" name="local_link" placeholder="Ex: Sala de Reuniões A ou https://meet.google.com/..."
                 class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Entrevistador</label>
          <input type="text" name="entrevistador" placeholder="Nome do responsável pela entrevista"
                 class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Observações</label>
          <textarea name="observacoes" rows="3" placeholder="Instruções para o candidato, tópicos a abordar..."
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all resize-none"></textarea>
        </div>

      </div>
    </div>

    <div class="flex justify-end gap-3">
      <a href="{% url 'rh_inst_candidatura_detalhe' cand.pk %}"
         class="px-6 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
        Cancelar
      </a>
      <button type="submit"
              class="px-8 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90 transition-all shadow-sm flex items-center gap-2">
        <i class="fas fa-calendar-check text-lg"></i>Agendar Entrevista
      </button>
    </div>
  </form>
</div>

{% endblock %}
