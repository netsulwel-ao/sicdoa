{% extends 'rh/base_rh.html' %}
{% block conteudo %}
    <div class="flex items-center gap-2 text-sm text-gray-500 mb-5 flex-wrap">
      <a href="{% url 'dashboard' %}" class="hover:text-primary">Dashboard</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <a href="{% url 'rh_admin_colaboradores_inst' %}" class="hover:text-primary">Colaboradores Institucionais</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <span class="text-gray-700 dark:text-gray-300">Editar</span>
    </div>

    <h1 class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white mb-6">
      <i class="fas fa-edit text-primary mr-2"></i>Editar Colaborador
    </h1>

    <form method="POST" class="max-w-2xl space-y-6">
      {% csrf_token %}
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Nome</label>
            <input type="text" name="nome" value="{{ colaborador.nome }}" required
                   class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email" name="email" value="{{ colaborador.email }}"
                   class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Telefone</label>
            <input type="text" name="telefone" value="{{ colaborador.telefone }}"
                   class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Área de Actuação</label>
            <select name="area_actuacao"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
              {% for cod, nome in colaborador.AREAS %}
              <option value="{{ cod }}" {% if colaborador.area_actuacao == cod %}selected{% endif %}>{{ nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Salário Base (Kz)</label>
            <input type="text" name="salario_base" value="{{ colaborador.salario_base|fmtkz|default:'' }}"
                   class="moeda w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Observações</label>
          <textarea name="observacoes" rows="3"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 resize-none">{{ colaborador.observacoes }}</textarea>
        </div>
      </div>

      <div class="flex justify-end gap-3">
        <a href="{% url 'rh_admin_colaboradores_inst' %}" class="px-6 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800">Cancelar</a>
        <button type="submit" class="px-8 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90 flex items-center gap-2">
          <i class="fas fa-save"></i> Salvar
        </button>
      </div>
    </form>
{% endblock %}
