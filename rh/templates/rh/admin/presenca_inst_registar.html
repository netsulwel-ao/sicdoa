{% include 'includes/head.html' %}
{% include 'includes/sidebar.html' %}
<div class="flex-1 ml-0 lg:ml-64 min-w-0">
  {% include 'includes/header.html' %}
  <main class="p-4 md:p-6 lg:p-8">
    <div class="flex items-center gap-2 text-sm text-gray-500 mb-5 flex-wrap">
      <a href="{% url 'dashboard' %}" class="hover:text-primary">Dashboard</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <a href="{% url 'rh_admin_presencas_inst' %}" class="hover:text-primary">Presenças</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <span class="text-gray-700 dark:text-gray-300">Registar</span>
    </div>
    <h1 class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white mb-6"><i class="fas fa-plus-circle text-primary mr-2"></i>Registar Presença</h1>
    <form method="POST" class="max-w-lg space-y-4">
      {% csrf_token %}
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Colaborador</label>
          <select name="colaborador" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
            {% for c in colaboradores %}
            <option value="{{ c.id }}">{{ c.nome }} — {{ c.area_actuacao }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Data</label>
          <input type="date" name="data" required value="{% now 'Y-m-d' %}" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Tipo</label>
          <select name="tipo" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
            <option value="Entrada">Entrada</option>
            <option value="Saida">Saída</option>
            <option value="Falta">Falta</option>
            <option value="Falta_Justificada">Falta Justificada</option>
            <option value="Hora_Extra">Hora Extra</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Hora Entrada</label>
            <input type="time" name="hora_entrada" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Hora Saída</label>
            <input type="time" name="hora_saida" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Justificação</label>
          <textarea name="justificacao" rows="2" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 resize-none"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3">
        <a href="{% url 'rh_admin_presencas_inst' %}" class="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-700 font-semibold hover:bg-gray-50">Cancelar</a>
        <button type="submit" class="px-8 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90">Registar</button>
      </div>
    </form>
  </main>
</div>
{% include 'includes/footer.html' %}
