{% extends 'rh/base_rh.html' %}
{% block conteudo %}
    <h1 class="text-2xl md:text-3xl font-black text-gray-900 dark:text-white mb-6"><i class="fas fa-plus-circle text-primary mr-2"></i>Novo Ciclo de Avaliação</h1>
    <form method="POST" class="max-w-lg space-y-4">
      {% csrf_token %}
      <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Nome do Ciclo</label>
          <input type="text" name="nome" required placeholder="Ex: Avaliação Semestral 2026" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Período Início</label>
            <input type="date" name="periodo_inicio" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Período Fim</label>
            <input type="date" name="periodo_fim" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
          </div>
        </div>
      </div>
      <div class="flex justify-end gap-3">
        <a href="{% url 'rh_admin_avaliacoes_inst' %}" class="px-6 py-3 rounded-xl border-2 border-gray-200 text-gray-700 font-semibold hover:bg-gray-50">Cancelar</a>
        <button type="submit" class="px-8 py-3 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90">Criar Ciclo</button>
      </div>
    </form>
{% endblock %}
