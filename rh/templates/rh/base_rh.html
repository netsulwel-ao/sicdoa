{% extends 'base.html' %}

{% block breadcrumbs %}
<div class="flex items-center gap-2 text-sm text-gray-500 mb-5 flex-wrap">
  <a href="{% if e_gestor_filial %}{% url 'dashboard_colaborador' %}{% else %}{% url 'dashboard' %}{% endif %}" class="hover:text-primary transition-colors">Dashboard</a>
  <i class="fas fa-chevron-right text-xs"></i>
  <a href="{% url 'rh_banca' %}" class="hover:text-primary transition-colors">RH</a>
  {% block breadcrumb %}{% endblock %}
</div>
{% endblock %}

{% block content %}
{% if sucesso %}
<div data-success-message="{{ sucesso }}" style="display: none;"></div>
{% endif %}
{% if erro %}
<div data-error-message="{{ erro }}" style="display: none;"></div>
{% endif %}
{% block conteudo %}{% endblock %}
{% endblock %}
