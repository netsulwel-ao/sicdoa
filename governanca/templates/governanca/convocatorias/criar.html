{% include 'includes/head.html' %}
{% include 'includes/sidebar.html' %}

<div class="flex-1 ml-0 lg:ml-64 min-w-0">
  {% include 'includes/header.html' %}
  <main class="p-4 md:p-6 lg:p-8">

    <div class="mb-6">
      <a href="{% url 'governanca_convocatorias' assembleia.pk %}" class="text-sm text-gray-500 dark:text-gray-400 hover:text-primary mb-2 flex items-center gap-1">
        <i class="fas fa-arrow-left text-base"></i> Voltar
      </a>
      <h1 class="text-[#111418] dark:text-gray-200 text-2xl md:text-3xl font-black mt-2">Nova Convocatória</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">{{ assembleia.titulo }}</p>
    </div>

    <div class="max-w-2xl">
      <form method="POST" enctype="multipart/form-data" class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Título *</label>
          <input type="text" name="titulo" required class="form-input" placeholder="Ex: Convocatória para Assembleia Geral Extraordinária">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descrição</label>
          <textarea name="descricao" rows="4" class="form-input" placeholder="Descrição da convocatória..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Prazo de Confirmação</label>
            <input type="datetime-local" name="prazo_confirmacao" class="form-input">
            <p class="text-xs text-gray-400 mt-1">Data limite para confirmação de presença</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Documento (PDF)</label>
            <input type="file" name="documento" accept=".pdf,.doc,.docx" class="form-input text-sm file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:bg-primary/10 file:text-primary">
          </div>
        </div>

        <div class="flex items-center gap-3 pt-4 border-t border-gray-200 dark:border-gray-800">
          <button type="submit" class="px-6 py-2.5 bg-primary text-white text-sm font-medium rounded-lg hover:bg-primary/90 transition-colors">
            Criar Convocatória
          </button>
          <a href="{% url 'governanca_convocatorias' assembleia.pk %}" class="px-4 py-2.5 text-sm text-gray-600 dark:text-gray-400 font-medium hover:text-gray-800 dark:hover:text-gray-200 transition-colors">
            Cancelar
          </a>
        </div>
      </form>
    </div>

  </main>
</div>

{% include 'includes/footer.html' %}
