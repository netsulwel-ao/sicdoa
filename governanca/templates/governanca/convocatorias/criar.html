{% include 'includes/head.html' %}
{% include 'includes/sidebar.html' %}

<div class="flex-1 ml-0 lg:ml-64 min-w-0">
  {% include 'includes/header.html' %}
  <main class="p-4 md:p-6 lg:p-8">

    <div class="max-w-2xl mx-auto mb-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h1 class="text-[#111418] dark:text-gray-200 text-2xl md:text-3xl font-black">Nova Convocatória</h1>
          <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">{{ assembleia.titulo }}</p>
        </div>
        <a href="{% url 'governanca_convocatorias' assembleia.pk %}"
           class="inline-flex items-center gap-2 px-4 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-all text-sm">
          <i class="fas fa-arrow-left text-base"></i>Voltar
        </a>
      </div>
      <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">{{ assembleia.titulo }}</p>
    </div>

    <div class="max-w-2xl mx-auto">
      <form method="POST" enctype="multipart/form-data" class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Título *</label>
          <input type="text" name="titulo" required
                 class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
                 placeholder="Ex: Convocatória para Assembleia Geral Extraordinária">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descrição</label>
          <textarea name="descricao" rows="4"
                    class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
                    placeholder="Descrição da convocatória..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Prazo de Confirmação</label>
            <input type="datetime-local" name="prazo_confirmacao"
                   class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
            <p class="text-xs text-gray-400 mt-1">Data limite para confirmação de presença</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Documento (PDF)</label>
            <input type="file" name="documento" accept=".pdf,.doc,.docx"
                   class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:text-xs file:bg-primary/10 file:text-primary">
          </div>
        </div>

        <div class="flex items-center gap-3 pt-4 border-t border-gray-200 dark:border-gray-800">
          <button type="submit" class="px-6 py-2.5 bg-primary text-white text-sm font-medium rounded-lg hover:bg-primary/90 transition-colors">
            Criar Convocatória
          </button>
          <a href="{% url 'governanca_convocatorias' assembleia.pk %}" class="inline-flex items-center gap-2 px-4 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-all text-sm">
            <i class="fas fa-arrow-left text-base"></i>Voltar
          </a>
        </div>
      </form>
    </div>

  </main>
</div>

{% include 'includes/footer.html' %}
