{% include 'includes/head.html' %}
<body class="bg-white dark:bg-gray-900">
  <div class="max-w-4xl mx-auto py-8 px-4">
    <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-200 dark:border-gray-800">
      <div>
        <h1 class="text-xl font-bold text-[#111418] dark:text-gray-200">{{ doc.titulo }}</h1>
        <p class="text-sm text-gray-500">Gerado em {{ doc.created_at|date:"d/m/Y H:i" }}</p>
      </div>
      <a href="javascript:window.print()" class="px-4 py-2 text-xs font-medium border border-gray-300 dark:border-gray-700 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors flex items-center gap-2">
        <i class="fas fa-print"></i> Imprimir
      </a>
    </div>
    <div class="documento-conteudo">
      {{ doc.conteudo|safe }}
    </div>
  </div>
</body>
</html>
