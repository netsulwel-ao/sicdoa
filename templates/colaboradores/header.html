<header id="main-header"
  class="flex items-center justify-between border-b border-gray-200 dark:border-gray-800 px-4 lg:px-6 py-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm fixed top-0 left-0 lg:left-64 right-0 z-30 h-16 shadow-sm">

  <!-- ── Lado Esquerdo: Menu ── -->
  <div class="flex items-center gap-3 flex-1 min-w-0">

    <!-- Botão menu mobile -->
    <button id="menu-button"
      class="lg:hidden flex items-center justify-center h-9 w-9 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-700 dark:hover:text-gray-200 transition-all duration-150 active:scale-95 flex-shrink-0">
      <i class="fas fa-bars" style="font-size:22px;"></i>
    </button>

    <!-- Título da área (colaboradores não têm pesquisa global) -->
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0">
        <i class="fas fa-id-badge text-primary" style="font-size:16px;"></i>
      </div>
      <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Portal do Colaborador</span>
    </div>
  </div>

  <!-- ── Lado Direito: Acções + Perfil ── -->
  <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0 ml-3">

    <!-- Botão Dark Mode -->
    <button id="btn-dark-mode" title="Alternar tema"
      class="flex items-center justify-center h-9 w-9 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-700 dark:hover:text-gray-200 transition-all duration-150 active:scale-95">
      <i class="fas fa-moon dark:hidden" style="font-size:20px;"></i>
      <i class="fas fa-sun hidden dark:inline" style="font-size:20px;"></i>
    </button>

    <!-- Notificações -->
    <div class="relative">
      <button id="btn-notificacoes" title="Notificações"
        class="flex items-center justify-center h-9 w-9 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-gray-700 dark:hover:text-gray-200 transition-all duration-150 active:scale-95">
        <i class="fas fa-bell" style="font-size:20px;"></i>
      </button>
      <span id="notif-badge"
        class="hidden absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white dark:ring-gray-900"></span>
    </div>

    <!-- Divider -->
    <div class="hidden sm:block w-px h-6 bg-gray-200 dark:bg-gray-700 mx-1"></div>

    <!-- Perfil — Desktop -->
    <a href="{% url 'colaborador_perfil' %}"
      class="hidden sm:flex items-center gap-2.5 pl-1 pr-3 py-1.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-150 group">
      <div class="relative flex-shrink-0">
        <div
          class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center shadow-sm">
          <i class="fas fa-user text-white" style="font-size:17px;"></i>
        </div>
        <span
          class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-400 rounded-full ring-2 ring-white dark:ring-gray-900"></span>
      </div>
      <div class="flex flex-col leading-tight">
        <span
          class="text-sm font-semibold text-gray-800 dark:text-gray-100 group-hover:text-primary transition-colors truncate max-w-[120px]">{{
          nome }}</span>
        <span class="text-xs text-gray-500 dark:text-gray-400 truncate max-w-[120px]">
          Colaborador{% if e_responsavel %} · Responsável{% endif %}
        </span>
      </div>
      <i
        class="fas fa-chevron-down text-gray-400 dark:text-gray-500 group-hover:text-primary transition-colors ml-0.5"
        style="font-size:16px;"></i>
    </a>

    <!-- Perfil — Mobile -->
    <a href="{% url 'colaborador_perfil' %}"
      class="sm:hidden relative flex items-center justify-center h-9 w-9 rounded-full bg-gradient-to-br from-primary to-blue-600 shadow-sm flex-shrink-0">
      <i class="fas fa-user text-white" style="font-size:18px;"></i>
      <span
        class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-400 rounded-full ring-2 ring-white dark:ring-gray-900"></span>
    </a>
  </div>
</header>

<!-- Espaçador para compensar o header fixo -->
<div style="height:64px; min-height:64px;" aria-hidden="true"></div>

<script>
  (function () {
    /* ── Dark Mode Toggle ────────────────────────────────────────────── */
    const btnDark = document.getElementById('btn-dark-mode');
    if (btnDark) {
      btnDark.addEventListener('click', function () {
        const html = document.documentElement;
        const isDark = html.classList.toggle('dark');
        html.classList.toggle('light', !isDark);
        try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) { }
      });

      try {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else if (saved === 'light') {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
        }
      } catch (e) { }
    }
  })();
</script>
