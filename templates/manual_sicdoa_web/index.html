{% extends 'base.html' %}
{% block title %}Manual SICDOA{% endblock %}

{% block main_classes %}p-0{% endblock %}

{% block content %}
<div style="background:#060d1f;min-height:100vh;color:#fff;">

  <div style="position:sticky;top:64px;z-index:50;background:rgba(6,13,31,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <h1 style="font-size:1rem;margin:0;font-weight:600;color:#fff;">Manual SICDOA — Manual do Utilizador</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:0.72rem;background:rgba(24,163,245,0.18);color:#5cc4ff;border:1px solid rgba(24,163,245,0.4);padding:4px 10px;border-radius:20px;">versão 2.0</span>
      <span id="pageIndicator" style="font-size:0.8rem;color:rgba(255,255,255,0.6);">Página 1 de 20</span>
      <div style="display:flex;gap:8px;">
        <button id="prevBtn" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:7px 14px;font-size:0.8rem;cursor:pointer;transition:background .15s ease;">‹ Anterior</button>
        <button id="nextBtn" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:7px 14px;font-size:0.8rem;cursor:pointer;transition:background .15s ease;">Seguinte ›</button>
      </div>
    </div>
  </div>

  <div id="pagesWrap" style="padding:32px;display:flex;flex-direction:column;align-items:center;gap:28px;">
  </div>

</div>

<script>
  const totalPages = 20;
  let currentPage = 1;
  const wrap = document.getElementById('pagesWrap');
  const indicator = document.getElementById('pageIndicator');

  for(let i=1;i<=totalPages;i++){
    const num = String(i).padStart(2,'0');
    const block = document.createElement('div');
    block.style.cssText='width:100%;max-width:760px;scroll-margin-top:140px;';
    block.id='p'+i;
    block.innerHTML = `
      <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);">
        <img src="/static/manual_sicdoa_web/page-${num}.png" alt="Página ${i} do Manual SICDOA" loading="lazy" style="display:block;width:100%;height:auto;">
      </div>
      <div style="text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:10px;letter-spacing:1px;text-transform:uppercase;">Página ${i} de ${totalPages}</div>
    `;
    wrap.appendChild(block);
  }

  const blocks = document.querySelectorAll('[id^="p"]');

  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        currentPage = parseInt(entry.target.id.replace('p', ''), 10);
        indicator.textContent = 'Página ' + currentPage + ' de ' + totalPages;
      }
    });
  }, {rootMargin:'-40% 0px -50% 0px', threshold:0});

  blocks.forEach(b=>observer.observe(b));

  document.getElementById('prevBtn').addEventListener('click', ()=>{
    const idx = Math.max(1, currentPage - 1);
    document.getElementById('p'+idx).scrollIntoView({behavior:'smooth'});
  });

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    const idx = Math.min(totalPages, currentPage + 1);
    document.getElementById('p'+idx).scrollIntoView({behavior:'smooth'});
  });
</script>
{% endblock %}
