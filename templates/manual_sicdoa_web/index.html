<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual SICDOA — Manual do Utilizador</title>
<style>
  :root{
    --azul-escuro:#0a1a3a;
    --azul-vivo:#0b7de0;
    --azul-claro:#18a3f5;
    --branco:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background:#060d1f;
    color:#fff;
  }

  /* ---------- Main content ---------- */
  .content{
    width: 100%;
    min-height:100vh;
    background:#060d1f;
  }
  .topbar{
    position:sticky;top:0;
    z-index:50;
    background:rgba(6,13,31,0.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:14px 32px;
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;
  }
  .topbar h1{
    font-size:1rem;margin:0;font-weight:600;color:#fff;
  }
  .topbar .badge{
    font-size:0.72rem;
    background:rgba(24,163,245,0.18);
    color:#5cc4ff;
    border:1px solid rgba(24,163,245,0.4);
    padding:4px 10px;
    border-radius:20px;
  }
  .page-nav-btns{display:flex;gap:8px;}
  .page-nav-btns button{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff;
    border-radius:8px;
    padding:7px 14px;
    font-size:0.8rem;
    cursor:pointer;
    transition:background .15s ease;
  }
  .page-nav-btns button:hover{background:rgba(255,255,255,0.18);}
  .page-nav-btns button:disabled{opacity:0.35;cursor:default;}

  .pages-wrap{
    padding:32px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }
  .page-block{
    width:100%;
    max-width:760px;
    scroll-margin-top:80px;
  }
  .page-frame{
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .page-frame img{
    display:block;
    width:100%;
    height:auto;
  }
  .page-label{
    text-align:center;
    font-size:0.75rem;
    color:rgba(255,255,255,0.4);
    margin-top:10px;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  @media (max-width:900px){
    .topbar{padding:12px 16px;}
    .pages-wrap{padding:18px;}
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px;}
</style>
</head>
<body>

<div class="content">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <h1>Manual SICDOA — Manual do Utilizador</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="badge">versão 2.0</span>
      <div class="page-nav-btns">
        <button id="prevBtn">‹ Anterior</button>
        <button id="nextBtn">Seguinte ›</button>
      </div>
    </div>
  </div>

  <div class="pages-wrap" id="pagesWrap">
    <!-- Pages injected here -->
  </div>
</div>

<script>
  const totalPages = 20;
  let currentPage = 1;
  const wrap = document.getElementById('pagesWrap');
  
  // Injeta as páginas dinamicamente
  for(let i=1;i<=totalPages;i++){
    const num = String(i).padStart(2,'0');
    const block = document.createElement('div');
    block.className='page-block';
    block.id='p'+i;
    block.innerHTML = `
      <div class="page-frame">
        <img src="assets/page-${num}.png" alt="Página ${i} do Manual SICDOA" loading="lazy">
      </div>
      <div class="page-label">Página ${i} de ${totalPages}</div>
    `;
    wrap.appendChild(block);
  }

  const blocks = document.querySelectorAll('.page-block');

  // Observador para atualizar a página atual conforme o scroll ocorre
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        currentPage = parseInt(entry.target.id.replace('p', ''), 10);
      }
    });
  }, {rootMargin:'-40% 0px -50% 0px', threshold:0});
  
  blocks.forEach(b=>observer.observe(b));

  // Ações dos botões de Anterior / Seguinte
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    const idx = Math.max(1, currentPage - 1);
    document.getElementById('p'+idx).scrollIntoView({behavior:'smooth'});
  });
  
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    const idx = Math.min(totalPages, currentPage + 1);
    document.getElementById('p'+idx).scrollIntoView({behavior:'smooth'});
  });
</script>

</body>
</html>
