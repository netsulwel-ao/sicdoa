<!-- ══════════════════════════════════════════════════════════════
     MODAL DE CONFIRMAÇÃO GLOBAL — inclui em qualquer template
     Uso: abrirConfirm({ titulo, mensagem, tipo, textoBotao, onConfirm })
     tipo: 'danger' | 'warning' | 'info'  (default: 'danger')
══════════════════════════════════════════════════════════════ -->
<div id="confirmModal"
     class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-end sm:items-center justify-center p-0 sm:p-4"
     role="dialog" aria-modal="true" aria-labelledby="confirmModalTitulo">

  <div id="confirmModalBox"
       class="bg-white dark:bg-gray-800 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl shadow-2xl
              transform transition-all duration-200 translate-y-4 opacity-0">

    <!-- Handle mobile -->
    <div class="sm:hidden flex justify-center pt-3 pb-1">
      <div class="w-10 h-1 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
    </div>

    <!-- Ícone + Título -->
    <div class="flex items-start gap-4 px-5 pt-5 pb-4">
      <div id="confirmModalIconWrap"
           class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0">
        <i id="confirmModalIcon" class="fas" style="font-size:24px;"></i>
      </div>
      <div class="flex-1 min-w-0 pt-0.5">
        <h3 id="confirmModalTitulo" class="text-base font-bold text-gray-900 dark:text-white leading-snug"></h3>
        <p id="confirmModalMensagem" class="text-sm text-gray-500 dark:text-gray-400 mt-1 leading-relaxed"></p>
      </div>
    </div>

    <!-- Botões -->
    <div class="flex flex-col-reverse sm:flex-row gap-2 px-5 pb-5 pt-1">
      <button id="confirmModalCancelar"
              onclick="fecharConfirm()"
              class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium
                     text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700
                     hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition-colors active:scale-95">
        <i class="fas fa-times" style="font-size:16px;"></i>
        <span id="confirmModalTextoCancelar">Cancelar</span>
      </button>
      <button id="confirmModalConfirmar"
              class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold
                     text-white rounded-xl transition-all active:scale-95 shadow-sm">
        <i id="confirmModalIconBotao" class="fas" style="font-size:16px;"></i>
        <span id="confirmModalTextoConfirmar">Confirmar</span>
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  var _cb = null;

  var TIPOS = {
    danger: {
      iconWrap:  'bg-red-100 dark:bg-red-900/40',
      iconColor: 'text-red-600 dark:text-red-400',
      icon:      'fa-trash-alt',
      btnClass:  'bg-red-600 hover:bg-red-700',
      iconBtn:   'fa-trash-alt',
    },
    warning: {
      iconWrap:  'bg-amber-100 dark:bg-amber-900/40',
      iconColor: 'text-amber-600 dark:text-amber-400',
      icon:      'fa-exclamation-triangle',
      btnClass:  'bg-amber-500 hover:bg-amber-600',
      iconBtn:   'fa-check',
    },
    info: {
      iconWrap:  'bg-blue-100 dark:bg-blue-900/40',
      iconColor: 'text-primary dark:text-blue-400',
      icon:      'fa-info-circle',
      btnClass:  'bg-primary hover:bg-primary/90',
      iconBtn:   'fa-check',
    },
  };

  window.abrirConfirm = function (opts) {
    var tipo       = TIPOS[opts.tipo || 'danger'] || TIPOS.danger;
    var modal      = document.getElementById('confirmModal');
    var box        = document.getElementById('confirmModalBox');
    var iconWrap   = document.getElementById('confirmModalIconWrap');
    var icon       = document.getElementById('confirmModalIcon');
    var titulo     = document.getElementById('confirmModalTitulo');
    var mensagem   = document.getElementById('confirmModalMensagem');
    var btnConf    = document.getElementById('confirmModalConfirmar');
    var iconBtn    = document.getElementById('confirmModalIconBotao');
    var textoConf  = document.getElementById('confirmModalTextoConfirmar');
    var textoCan   = document.getElementById('confirmModalTextoCancelar');

    // Conteúdo
    titulo.textContent   = opts.titulo   || 'Confirmar';
    mensagem.textContent = opts.mensagem || 'Tem a certeza?';
    textoConf.textContent = opts.textoBotao  || 'Confirmar';
    textoCan.textContent  = opts.textoCancelar || 'Cancelar';

    // Estilo do tipo
    iconWrap.className = 'w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 ' + tipo.iconWrap;
    icon.className     = 'fas ' + tipo.iconColor + ' fa-fw ' + tipo.icon;
    iconBtn.className  = 'fas ' + tipo.iconBtn;

    // Limpar classes do botão e aplicar novas
    btnConf.className = btnConf.className
      .replace(/bg-\S+/g, '')
      .replace(/hover:bg-\S+/g, '')
      .trim();
    btnConf.className += ' ' + tipo.btnClass;

    // Callback
    _cb = opts.onConfirm || null;

    // Mostrar
    modal.classList.remove('hidden');
    requestAnimationFrame(function () {
      box.classList.remove('translate-y-4', 'opacity-0');
      box.classList.add('translate-y-0', 'opacity-100');
    });

    // Fechar ao clicar no backdrop
    modal.onclick = function (e) {
      if (e.target === modal) fecharConfirm();
    };

    // Fechar com Escape
    document._confirmEsc = function (e) {
      if (e.key === 'Escape') fecharConfirm();
    };
    document.addEventListener('keydown', document._confirmEsc);
  };

  window.fecharConfirm = function () {
    var modal = document.getElementById('confirmModal');
    var box   = document.getElementById('confirmModalBox');
    box.classList.add('translate-y-4', 'opacity-0');
    box.classList.remove('translate-y-0', 'opacity-100');
    setTimeout(function () { modal.classList.add('hidden'); }, 180);
    document.removeEventListener('keydown', document._confirmEsc);
    _cb = null;
  };

  document.getElementById('confirmModalConfirmar').addEventListener('click', function () {
    var cb = _cb;
    fecharConfirm();
    if (typeof cb === 'function') cb();
  });

  /** Confirma e submete um formulário POST (eliminar, reenviar, etc.) */
  window.confirmarFormPost = function (form, opts) {
    if (!form) return;
    abrirConfirm(Object.assign({
      tipo: 'danger',
      titulo: 'Confirmar',
      mensagem: 'Tem a certeza?',
      textoBotao: 'Confirmar',
    }, opts || {}, {
      onConfirm: function () {
        form.submit();
      },
    }));
  };
})();
</script>
