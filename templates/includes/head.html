/* ── Prevenir scroll horizontal em todo o projecto ── */
html, body {
  overflow-x: hidden;
  max-width: 100%;
}
*, *::before, *::after {
  box-sizing: border-box;
}

/* ── Inputs: prevenir zoom no iOS ── */
@media (max-width: 640px) {
  .form-input,
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="number"],
  input[type="password"],
  input[type="search"],
  select,
  textarea {
    font-size: 16px !important;
  }
}

/* ── Tabelas: sempre com scroll interno, nunca overflow global ── */
.table-responsive {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Imagens e media: nunca ultrapassar o contentor ── */
img, video, iframe, embed, object {
  max-width: 100%;
}

/* ── Texto longo: quebrar em vez de transbordar ── */
.break-words-safe {
  overflow-wrap: break-word;
  word-break: break-word;
  hyphens: auto;
}

/* (skeleton removido — usa-se barra de progresso no topo) */

{# ── Loading bar no topo (não afeta sidebar, header nem conteúdo) ───── #}
<div id="page-loader">
  <div id="loader-bar" class="fixed top-0 left-0 w-0 h-[3px] z-[99999]
       bg-gradient-to-r from-blue-500 via-blue-400 to-blue-600
       shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
</div>

<style>
#loader-bar.loading {
  animation: loader-progress 0.8s ease-in-out forwards;
}
@keyframes loader-progress {
  0%   { width: 0%; }
  30%  { width: 30%; }
  60%  { width: 60%; }
  100% { width: 85%; }
}
</style>

<script>
(function() {
  var bar = document.getElementById('loader-bar');
  if (!bar) return;

  function startLoader() {
    bar.classList.remove('loading');
    void bar.offsetWidth;
    bar.classList.add('loading');
  }

  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link || !link.href || link.hasAttribute('data-no-loader') ||
        link.hostname !== window.location.hostname ||
        link.getAttribute('href').startsWith('#') ||
        link.getAttribute('href').startsWith('javascript:') ||
        link.getAttribute('download') ||
        e.ctrlKey || e.metaKey || e.shiftKey) return;
    var href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('mailto:') && !href.startsWith('tel:')) {
      startLoader();
    }
  });

  window.addEventListener('beforeunload', function() {
    startLoader();
  });
})();
</script>
